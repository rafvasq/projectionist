services:
  projectionist:
    image: ghcr.io/rafvasq/projectionist:latest
    # Comment out the image line above and uncomment below to build locally
    # build: .
    restart: unless-stopped
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - PYTHONUNBUFFERED=1

  ollama:
    profiles: [ollama]
    image: ollama/ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  ollama_data:
